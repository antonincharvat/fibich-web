<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fibich Player</title>
    <meta
      name="description"
      content="Fibich Player is a simple placeholder landing page for a focused music listening app."
    >
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8f5;
        --ink: #1c2026;
        --muted: #667078;
        --line: #dde2e0;
        --surface: #ffffff;
        --surface-2: #eef3f1;
        --accent: #d95c3b;
        --accent-2: #2f8c84;
        --accent-3: #f1bd45;
        --shadow: 0 30px 90px rgba(28, 32, 38, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, rgba(47, 140, 132, 0.11), transparent 270px),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        min-height: 100vh;
        overflow: hidden;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 10px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: 0;
      }

      .mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 10px 30px rgba(28, 32, 38, 0.08);
      }

      .mark::before {
        width: 14px;
        height: 16px;
        border-radius: 2px 9px 9px 2px;
        background: var(--accent);
        clip-path: polygon(0 0, 100% 50%, 0 100%);
        content: "";
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 22px;
        color: var(--muted);
        font-size: 0.93rem;
        font-weight: 650;
      }

      .hero {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 58px 0 84px;
        text-align: center;
      }

      .headline {
        max-width: 760px;
        margin: 0 auto;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 18px;
        color: var(--accent-2);
        font-size: 0.88rem;
        font-weight: 800;
      }

      .kicker::before,
      .kicker::after {
        width: 22px;
        height: 1px;
        background: currentColor;
        content: "";
        opacity: 0.45;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.1rem, 8vw, 7.2rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .lead {
        max-width: 650px;
        margin: 24px auto 0;
        color: var(--muted);
        font-size: clamp(1.06rem, 2vw, 1.28rem);
        line-height: 1.65;
      }

      .platforms {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 30px 0 40px;
      }

      .platform {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        padding: 0 16px;
        color: var(--ink);
        font-size: 0.95rem;
        font-weight: 750;
        box-shadow: 0 8px 24px rgba(28, 32, 38, 0.07);
      }

      .platform.primary {
        border-color: transparent;
        background: var(--ink);
        color: #ffffff;
      }

      .showcase {
        position: relative;
        margin: 0 auto;
      }

      .screenshot-frame {
        width: 100%;
        border: 1px solid rgba(28, 32, 38, 0.12);
        border-radius: 18px;
        background: var(--surface);
        padding: 10px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .app-screenshot {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 12px;
      }

      .footer-note {
        margin: 28px auto 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      @media (max-width: 740px) {
        .nav-links {
          display: none;
        }

        .hero {
          padding-top: 42px;
        }

        .screenshot-frame {
          border-radius: 14px;
          padding: 6px;
        }
      }

      @media (max-width: 480px) {
        .platform {
          width: 100%;
        }

        .app-screenshot {
          border-radius: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <nav class="nav" aria-label="Main navigation">
        <a class="brand" href="#">
          <span>Fibich</span>
        </a>
        <div class="nav-links">
          <a href="#preview">Preview</a>
          <a href="mailto:hello@fibich.app">Contact</a>
        </div>
      </nav>

      <section class="hero" id="preview">
        <div class="headline">
          <h1>Music. Organized.</h1>
          <p class="lead">
            Fibich is a simple yet powerful music player focused on the library and returning to your favorite tracks without the interface getting in the way.
          </p>
        </div>

        <div class="platforms" aria-label="Placeholder product controls">
          <a class="platform primary" href="#">Download for Mac</a>
        </div>

        <div class="showcase" aria-label="Fibich Player app preview">
          <div class="screenshot-frame">
            <img
              class="app-screenshot"
              src="assets/fibich-player-screenshot.png"
              alt="Fibich Player app screenshot"
            >
          </div>
        </div>

        <p class="footer-note">Fibich is currently in the development. More information coming soon.</p>
      </section>
    </main>
  </body>
</html>
